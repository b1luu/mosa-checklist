<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosa Tea Opening</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container checklist-page">
        <h1>Opening Checklist</h1>
        <p>Complete opening tasks before service.</p>

        <section class="checklist-group">
            <h2>Lights</h2>
            <ul class="task-list">
                <li class="task-item">
                    <label>
                        <input type="checkbox">
                        Turn on all lights (see details)
                    </label>
                    <ul class="task-sublist">
                        <li class="task-item">
                            <label>
                                <input type="checkbox">
                                4 switches by the front door
                            </label>
                        </li>
                        <li class="task-item">
                            <label>
                                <input type="checkbox">
                                4 switches outside the restroom
                            </label>
                        </li>
                        <li class="task-item">
                            <label>
                                <input type="checkbox">
                                1 switch for the storage hall
                            </label>
                        </li>
                    </ul>
                </li>
            </ul>
        </section>

        <section class="checklist-group">
            <h2>Machines &amp; Equipment</h2>
            <ul class="task-list">
                <li class="task-item">
                    <label>
                        <input type="checkbox">
                        Turn on 4 machines
                    </label>
                </li>
                <li class="task-item">
                    <label>
                        <input type="checkbox">
                        Turn on the Sugar Dispenser (also turn the heat on)
                    </label>
                </li>
                <li class="task-item">
                    <label>
                        <input type="checkbox">
                        Plug in Sealer
                    </label>
                </li>
                <li class="task-item">
                    <label>
                        <input type="checkbox">
                        Plug in Prep Station
                    </label>
                </li>
                <li class="task-item">
                    <label>
                        <input type="checkbox">
                        Plug in Boba Warmer
                    </label>
                </li>
            </ul>
        </section>

        <div class="mode-buttons">
            <a class="back-link" href="index.html">Back to Home</a>
        </div>
    </main>
</body>
</html>
